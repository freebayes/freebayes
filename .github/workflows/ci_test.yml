name: CI
on: [push, pull_request]
jobs:
  arch:
    name: freebayes-CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: [3.12]
    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y -f install samtools bc parallel libvcflib-tools libseqlib2 libseqlib-dev libvcflib-dev libfastahack-dev fastahack smithwaterman libwfa2-dev libsimde-dev meson ninja-build
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Checkout submodules
      run: git submodule update --init --recursive
    - name: Configure
      run: meson setup build/ -Dprefer_system_deps=false --buildtype debug
    - name: Compile
      run: ninja -C build/ -v
    - name: Run tests
      run: meson test --timeout-multiplier 4 --print-errorlogs -C build/
    - name: Clone and build master for regression baseline
      run: |
        git clone --recurse-submodules --branch master https://github.com/${{ github.repository }} /tmp/fb-master
        meson setup /tmp/fb-master/build/ /tmp/fb-master/ -Dprefer_system_deps=false --buildtype debug
        ninja -C /tmp/fb-master/build/
    - name: Generate regression baseline from master
      run: |
        FREEBAYES=/tmp/fb-master/build/freebayes \
        BASELINE_DIR=/tmp/fb-baseline \
        bash test/regression_test.sh --update
    - name: Run regression tests against master baseline
      run: |
        BASELINE_DIR=/tmp/fb-baseline \
        bash test/regression_test.sh

  build-aarch64:
    name: freebayes-CI aarch64
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
